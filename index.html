            ]},

                { id: "d11-1", time: "下午", info: "青島棧橋/奧帆中心", type: "sight", query: "青島棧橋", forecast: "cold", tips: ["必吃海鮮大排檔，注意腸胃"] }

            { date: "12/4", title: "返程", weatherQuery: "香港", details: [
                { id: "d12-1", time: "12:20", info: "返香港機", type: "flight", query: "香港國際機場", desc: "旅途結束！" }
            ]}

        tripData.forEach(day => totalSpots += day.details.length);
        let checkins = JSON.parse(localStorage.getItem('checkins')) || [];
        let ledgerData = JSON.parse(localStorage.getItem('ledgerData')) || [];

        function renderItinerary() {
            const nav = document.getElementById('dateNav');
            const content = document.getElementById('itinerary-content');
            nav.innerHTML = ''; content.innerHTML = '';
            
            tripData.forEach((day, index) => {
                const isTodayStr = getIsToday(day.date);
                
                const btn = document.createElement('button');
                btn.id = `btn-${index}`;
                btn.onclick = () => showDay(index);
                let btnClass = "flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-black transition-all shadow-sm ";
                if (isTodayStr) btnClass += "bg-[#34C759] text-white"; 
                else if (index === 0) btnClass += "bg-[#007AFF] text-white shadow-md"; 
                else btnClass += "bg-white text-gray-800 border border-gray-100"; 
                btn.className = btnClass; btn.innerText = day.date; nav.appendChild(btn);

                const card = document.createElement('div');
                card.className = `day-card w-full pb-6`; // removed 'active' logic from css hiding, all render to allow scroll
                card.id = `day-${index}`;
                
                let itemsHtml = day.details.map(item => {
                    const isPast = getIsPast(day.date, item.time);
                    const isChecked = checkins.includes(item.id);
                    
                    const flightBtnHtml = item.type === 'flight' && item.flightNo ? 
                        `<a href="https://flightaware.com/live/flight/${item.flightNo}" target="_blank" class="mt-3 inline-flex items-center gap-1 bg-blue-50 text-[#007AFF] text-xs font-bold px-3 py-1.5 rounded-lg border border-blue-100"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>追蹤航班 ${item.flightNo}</a>` : '';

                    return `
                        <div class="item-card relative pl-12 mb-6 ${isPast ? 'past' : ''}">
                            <div class="absolute left-0 top-1 w-10 h-10 flex items-center justify-center bg-white rounded-full border-2 border-[#007AFF] shadow-sm z-10 text-[#007AFF] cursor-pointer" onclick="openMap('${item.query}', '${item.desc || item.info}', '${item.tips ? item.tips.join('##') : ''}')">
                                ${getSvgIcon(item.type)}
                            </div>
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                                <div class="flex justify-between items-start">
                                    <span class="text-xs font-black ${isPast ? 'bg-gray-100 text-gray-600' : 'bg-blue-50 text-[#007AFF]'} px-3 py-1.5 rounded-full font-bold">${item.time}</span>
                                    <label class="flex items-center gap-1.5 cursor-pointer bg-gray-50 px-2 py-1.5 rounded-lg border border-gray-100">
                                        <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheckin('${item.id}', this.checked)" class="w-4 h-4 accent-green-500">
                                        <span class="text-[10px] font-bold text-gray-500">打卡</span>
                                    </label>
                                </div>
                                <p class="text-gray-900 mt-3 font-bold text-lg leading-snug cursor-pointer" onclick="openMap('${item.query}', '${item.desc || item.info}', '${item.tips ? item.tips.join('##') : ''}')">${item.info}</p>
                                ${flightBtnHtml}
                            </div>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="mb-6 ml-3 flex items-center justify-between">
                        <div><h2 class="text-2xl font-black text-gray-900 tracking-tight">${day.title}</h2></div>
                        ${isTodayStr ? '<span class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-black">今天</span>' : ''}
                    </div>
                    <div class="relative timeline-line">${itemsHtml}</div>
                `;
                content.appendChild(card);
            });
            updateProgress();
        }

        function getSvgIcon(type) {
            const icons = {
                flight: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>',
                transport: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h8M8 11h8M12 21a9 9 0 110-18 9 9 0 010 18z"></path></svg>',
                food: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"></path></svg>', // Using general icon to save size, replace as needed
                hotel: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>',
                sight: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>',
                shopping: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>'
            };
            return icons[type] || '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>';
        }

        function showDay(index) {
            // Smooth scroll to the specific day with an offset for the header
            const target = document.getElementById(`day-${index}`);
            if(target) {
                const headerOffset = 180; // height of the sticky header roughly
                const elementPosition = target.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });
            }

            // Update button UI
            document.querySelectorAll('#dateNav button').forEach(b => { 
                if(!b.classList.contains('bg-[#34C759]')) {
                    b.className = "flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-black transition-all shadow-sm bg-white text-gray-800 border border-gray-100"; 
                }
            });
            const activeBtn = document.getElementById(`btn-${index}`);
            if(!activeBtn.classList.contains('bg-[#34C759]')) {
                activeBtn.className = "flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-black transition-all shadow-sm bg-[#007AFF] text-white shadow-md";
            }
        }

        // --- Currency Converter (Two-way logic) ---
        function calculate() {
            // Base logic relative to HKD (1 HKD = X Foreign)
            // Or Foreign to HKD (1 Foreign = X HKD)
            const ratesToHkd = { HKD: 1, JPY: 0.051, TWD: 0.245, CNY: 1.08 }; // Using approx updated rates
            
            const amt = parseFloat(document.getElementById('calc-input').value) || 0;
            const fromCurr = document.getElementById('calc-from').value;
            const toCurr = document.getElementById('calc-to').value;
            
            // Convert input to HKD first, then HKD to target
            const amtInHkd = amt * ratesToHkd[fromCurr];
            const result = amtInHkd / ratesToHkd[toCurr];
            
            document.getElementById('calc-result').innerText = result.toFixed(2);
            document.getElementById('calc-result-currency').innerText = toCurr;
        }

        // --- Advanced Ledger (記帳) Logic ---
        function addLedgerEntry() {
            const name = document.getElementById('ledger-name').value.trim();
            const amount = parseFloat(document.getElementById('ledger-amount').value);
            const curr = document.getElementById('ledger-curr').value;
            const who = document.getElementById('ledger-who').value;
            const cat = document.getElementById('ledger-cat').value;
            
            if(!name || !amount) { alert("請填寫項目與金額！"); return; }

            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            const ratesToHkd = { HKD: 1, JPY: 0.051, TWD: 0.245, CNY: 1.08 };
            const hkdAmount = amount * ratesToHkd[curr];

            ledgerData.unshift({ name, amount, curr, hkdAmount, who, cat, timeStr });
            localStorage.setItem('ledgerData', JSON.stringify(ledgerData));
            
            // Clear inputs
            document.getElementById('ledger-name').value = '';
            document.getElementById('ledger-amount').value = '';
            
            renderLedger();
        }

        function renderLedger() {
            const container = document.getElementById('ledger-items');
            container.innerHTML = '';
            let totalHkd = 0;

            ledgerData.forEach((item, idx) => {
                totalHkd += item.hkdAmount;
                container.innerHTML += `
                    <div class="flex justify-between items-center p-3 border-b border-gray-100 last:border-0">
                        <div>
                            <p class="font-bold text-gray-800">${item.name}</p>
                            <p class="text-xs text-gray-500 mt-1 flex gap-2">
                                <span class="bg-gray-100 px-2 py-0.5 rounded">${item.who}</span>
                                <span class="bg-gray-100 px-2 py-0.5 rounded">${item.cat}</span>
                                <span>${item.timeStr}</span>
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-red-600">${item.curr} ${item.amount}</p>
                            <p class="text-[10px] text-gray-400">≈ HKD ${item.hkdAmount.toFixed(1)}</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById('ledger-total').innerText = `$ ${totalHkd.toFixed(2)}`;
        }

        function toggleCheckin(id, isChecked) {
            if (isChecked) checkins.push(id); else checkins = checkins.filter(c => c !== id);
            localStorage.setItem('checkins', JSON.stringify(checkins));
            updateProgress();
        }

        function updateProgress() {
            const percent = Math.round((checkins.length / totalSpots) * 100) || 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${percent}%`;
        }

        function getIsToday(dStr) { const p = dStr.split('/'); return new Date(2026, p[1]-1, p[0]).toDateString() === TODAY.toDateString(); }
        function getIsPast(dStr, tStr) { return false; }

        function switchTab(tabId) {
            document.querySelectorAll('.view-page').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${tabId}`).classList.add('active');
            
            // Reset nav styles
            document.querySelectorAll('.nav-btn').forEach(btn => { 
                btn.classList.remove('text-[#007AFF]', 'bg-[#E1E1E6]');
                btn.classList.add('text-gray-500');
            });
            // Set active nav style
            const activeNav = document.getElementById(`nav-${tabId}`);
            activeNav.classList.remove('text-gray-500');
            activeNav.classList.add('text-[#007AFF]', 'bg-[#E1E1E6]');
            
            window.scrollTo({top: 0, behavior: "smooth"});
        }

        // Initialize Everything
        renderItinerary();
        calculate();
        renderLedger();
    </script>
