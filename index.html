            const content = document.getElementById('itinerary-content');

            tripData.forEach((day, index) => {

                btn.onclick = () => showDay(index);
                let btnClass = "flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-black transition-all shadow-sm ";
                if (isTodayStr) btnClass += "bg-[#34C759] text-white"; 
                else if (index === 0) btnClass += "bg-white text-[#007AFF] shadow-md border border-gray-100"; 
                else btnClass += "bg-[#333]/10 text-gray-800"; 
                btn.className = btnClass; btn.innerText = day.date; nav.appendChild(btn);

                const card = document.createElement('div');
                card.className = `day-card ${index === 0 ? 'active' : ''}`;
                card.id = `day-${index}`;
                
                let itemsHtml = day.details.map(item => {
                    const isPast = getIsPast(day.date, item.time);
                    const isChecked = checkins.includes(item.id);
                    
                    const flightBtnHtml = item.type === 'flight' && item.flightNo ? 
                        `<a href="https://flightaware.com/live/flight/${item.flightNo}" target="_blank" class="mt-3 inline-block bg-blue-100 text-[#007AFF] text-xs font-bold px-3 py-1.5 rounded-lg active:bg-blue-200">✈️ 追蹤航班 ${item.flightNo}</a>` : '';

                    return `
                        <div class="item-card relative pl-12 mb-6 ${isPast ? 'past' : ''}">
                            <div class="icon-box absolute left-0 top-1 w-10 h-10 flex items-center justify-center bg-white rounded-full border-2 border-blue-200 shadow-sm z-10 text-xl cursor-pointer" onclick="openMap('${item.query}', '${item.desc || item.info}', '${item.tips ? item.tips.join('##') : ''}')">
                                ${getIcon(item.type)}
                            </div>
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 border-l-[6px] ${isPast ? 'border-l-gray-300' : 'border-l-[#007AFF]'}">
                                <div class="flex justify-between items-start">
                                    <span class="time-tag text-xs font-black ${isPast ? 'bg-gray-100 text-gray-600' : 'bg-blue-50 text-[#007AFF]'} px-3 py-1.5 rounded-full font-bold cursor-pointer">${item.time}</span>
                                    <label class="flex items-center gap-1.5 cursor-pointer bg-gray-50 px-2 py-1 rounded-md border border-gray-100">
                                        <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheckin('${item.id}', this.checked)" class="w-4 h-4 accent-green-500">
                                        <span class="text-[10px] font-bold text-gray-500">打卡</span>
                                    </label>
                                </div>
                                <p class="text-gray-900 mt-2.5 font-bold text-lg leading-snug cursor-pointer" onclick="openMap('${item.query}', '${item.desc || item.info}', '${item.tips ? item.tips.join('##') : ''}')">${item.info}</p>
                                ${flightBtnHtml}
                            </div>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="mb-7 ml-3 flex items-center justify-between">
                        <div><h2 class="text-3xl font-black text-gray-900">${day.title}</h2></div>
                        ${isTodayStr ? '<span class="text-xs bg-green-100 text-green-700 px-3 py-1.5 rounded-full font-black">今天</span>' : ''}
                    </div>
                    <div class="relative timeline-line">${itemsHtml}</div>
                `;
                content.appendChild(card);
            });
            updateProgress();
        }

        function toggleCheckin(id, isChecked) {
            if (isChecked) checkins.push(id); else checkins = checkins.filter(c => c !== id);
            localStorage.setItem('checkins', JSON.stringify(checkins));
            updateProgress();
        }

        function updateProgress() {
            const percent = Math.round((checkins.length / totalSpots) * 100) || 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${percent}%`;
        }

        function speakJapanese(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP'; utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else { alert("瀏覽器不支援語音。"); }
        }

        function openMap(query, desc, tipsStr) {
            switchTab('map');
            document.getElementById('map-title').innerText = query;
            document.getElementById('map-desc').innerText = desc;
            const tips = tipsStr ? tipsStr.split('##') : [];
            const tipCont = document.getElementById('map-highlights-container');
            const tipsList = document.getElementById('map-highlights');
            tipsList.innerHTML = '';
            if (tips.length > 0 && tips[0] !== "") {
                tipCont.classList.remove('hidden');
                tips.forEach(t => tipsList.innerHTML += `<p class="flex gap-2"><span class="text-amber-500">★</span><span>${t}</span></p>`);
            } else tipCont.classList.add('hidden');
            document.getElementById('gmap-iframe').src = `https://www.google.com/maps?q=${encodeURIComponent(query)}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
            document.getElementById('gmap-ext-btn').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
        }

        function openOfflineMap(src) {
            const overlay = document.getElementById('offline-map-overlay');
            const bigImg = document.getElementById('offline-map-big');
            bigImg.src = src;
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
        }

        function closeOfflineMap() {
            const overlay = document.getElementById('offline-map-overlay');
            overlay.classList.remove('opacity-100');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        function updateSmartDashboard() {
            const tripStart = new Date(2026, 3, 1);
            const diffDays = Math.ceil((tripStart - TODAY) / (1000 * 60 * 60 * 24));
            let weatherQuery = "香港";

            if (diffDays > 0) { document.getElementById('dashboard-info').innerText = `${diffDays} 天`; }
            else if (diffDays === 0) { document.getElementById('dashboard-info').innerText = "就是今天！"; weatherQuery = "台灣"; }
            else if (diffDays > -12) { 
                document.getElementById('dashboard-info').innerText = `第 ${Math.abs(diffDays) + 1} 天`;
                const todayData = tripData.find(d => getIsToday(d.date));
                if (todayData) weatherQuery = todayData.weatherQuery;
            } else { document.getElementById('dashboard-info').innerText = "旅途結束"; }
            
            document.getElementById('dashboard-weather-icon').innerText = weatherQuery === "香港" ? '🏠' : '☀️';

            const reminderCont = document.getElementById('weather-reminder');
            const reminderMsg = document.getElementById('weather-reminder-msg');
            
            const checklistWeatherCont = document.getElementById('checklist-weather-reminder');
            const checklistWeatherMsg = document.getElementById('checklist-weather-msg');

            const publicUl = document.getElementById('list-public');
            const personalUl = document.getElementById('list-personal');
            publicUl.innerHTML = ''; personalUl.innerHTML = '';
            checklistData.public.forEach((item, i) => renderListItem(publicUl, `pub_${i}`, item));
            
            let finalPersonalList = [...checklistData.personal];

            const upcomingDays = tripData.filter(d => {
                const parts = d.date.split('/');
                const tripDate = new Date(2026, parts[1]-1, parts[0]);
                const diffTime = tripDate - TODAY;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diffDays >= 0 && diffDays <= 2;
            });

            let smartItems = [];
            let reminderTexts = [];

            upcomingDays.forEach(day => {
                if (day.details.some(item => item.forecast === "rain")) {
                    if (!smartItems.includes("雨傘/雨衣")) {
                        smartItems.push("雨傘/雨衣");
                        reminderTexts.push(`🌧️ ${day.date} ${day.weatherQuery} 預報有雨，請記得帶傘！`);
                    }
                }
                if (day.details.some(item => item.forecast === "cold")) {
                    if (!smartItems.includes("保暖外套")) {
                        smartItems.push("保暖外套");
                        reminderTexts.push(`❄️ ${day.date} ${day.weatherQuery} 氣溫偏低(模擬12°C)，請記得保暖外套！`);
                    }
                }
            });

            if (reminderTexts.length > 0) {
                reminderCont.classList.remove('hidden');
                reminderMsg.innerText = reminderTexts[0];

                checklistWeatherCont.classList.remove('hidden');
                checklistWeatherMsg.innerText = smartItems.join('、');
                
                smartItems.forEach(item => {
                    finalPersonalList.unshift(`⭐${item}`); 
                });
            } else {
                reminderCont.classList.add('hidden');
                checklistWeatherCont.classList.add('hidden');
            }

            finalPersonalList.forEach((item, i) => renderListItem(personalUl, `pers_${i}`, item, item.startsWith('⭐')));
        }

        function getIsToday(dStr) { const p = dStr.split('/'); return new Date(2026, p[1]-1, p[0]).toDateString() === TODAY.toDateString(); }
        function getIsPast(dStr, tStr) { return false; }
        function getIcon(type) { return {flight:'✈️', transport:'🚆', food:'🍱', hotel:'🏨', sight:'🏯', shopping:'🛍️'}[type] || '📍'; }
        
        function calculate() {
            const amt = parseFloat(document.getElementById('calc-input').value) || 0;
            const rate = parseFloat(document.getElementById('calc-currency').value);
            document.getElementById('calc-result').innerText = (amt * rate).toFixed(2);
        }

        function renderListItem(container, id, text, isSmart = false) {
            const li = document.createElement('label');
            li.className = `flex items-center gap-3 bg-gray-50 p-3 rounded-xl ${isSmart ? 'border border-purple-100 bg-purple-50' : ''}`;
            const isChecked = localStorage.getItem(`chk_${id}`) === 'true';
            li.innerHTML = `<input type="checkbox" id="chk_${id}" ${isChecked ? 'checked' : ''} onchange="saveCheckState('${id}', this.checked)" class="w-5 h-5 ${isSmart ? 'accent-purple-600' : 'accent-purple-600'} rounded"><span class="text-gray-800 font-medium ${isChecked ? 'line-through text-gray-400' : ''} ${isSmart ? 'text-purple-900 font-bold' : ''}">${text}</span>`;
            container.appendChild(li);
        }

        function saveCheckState(id, isChecked) {
            localStorage.setItem(`chk_${id}`, isChecked);
            const label = document.getElementById(`chk_${id}`).parentElement;
            label.querySelector('span').classList.toggle('line-through', isChecked);
            label.querySelector('span').classList.toggle('text-gray-400', isChecked);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view-page').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => { btn.className = "nav-btn w-[19%] flex flex-col items-center justify-center py-2.5 rounded-[30px] text-gray-800 transition-all"; });
            document.getElementById(`nav-${tabId}`).className = "nav-btn w-[19%] flex flex-col items-center justify-center py-2.5 rounded-[30px] bg-[#E1E1E6] text-[#007AFF] transition-all shadow-inner";
            window.scrollTo(0, 0);
        }

        function showDay(index) {
            document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`day-${index}`).classList.add('active');
            document.querySelectorAll('#dateNav button').forEach(b => { b.className = "flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-black transition-all shadow-sm bg-[#333]/10 text-gray-800"; });
            document.getElementById(`btn-${index}`).className = "flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-black transition-all shadow-sm bg-white text-[#007AFF] shadow-md border border-gray-100";
        }

        function initPwa() {
            const manifest = {
                "name": "2026 家族旅行 PRO", "short_name": "家族旅行", "start_url": ".", "display": "standalone",
                "background_color": "#f3f4f6", "theme_color": "#007AFF",
                "icons": [{ "src": "icon.jpeg", "sizes": "512x512", "type": "image/jpeg" }]
            };
            document.getElementById('pwa-manifest').setAttribute('href', URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'})));
        }

        renderItinerary();
        calculate();
        initPwa();
        
        setTimeout(updateSmartDashboard, 100);

    </script>
</body>
</html>
